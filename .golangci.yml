version: "2"
run:
  modules-download-mode: readonly
linters:
  enable:
    - bodyclose
    - gocritic
    - gosec
    - misspell
    - noctx
    - prealloc
    - revive
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    gosec:
      severity: medium
      confidence: medium
    revive:
      rules:
        - name: exported
          severity: warning
        - name: unexported-return
          severity: warning
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
          - noctx
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
