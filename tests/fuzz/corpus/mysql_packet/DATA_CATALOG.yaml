catalog_version: 1
description: "MySQL 프로토콜 패킷 퍼즈 테스트용 시드 코퍼스"
files:
  com_query_select1.bin:
    intent: "COM_QUERY 패킷 파싱 검증 (SELECT 1)"
    format: "MySQL wire protocol: 3B LE length + 1B seq + 0x03(COM_QUERY) + SQL text"
  com_ping.bin:
    intent: "COM_PING(0x0E) 패킷 처리 검증"
    format: "MySQL wire protocol: 3B LE length + 1B seq + 0x0E(COM_PING)"
  com_init_db.bin:
    intent: "COM_INIT_DB(0x02) 패킷 처리 검증"
    format: "MySQL wire protocol: 3B LE length + 1B seq + 0x02(COM_INIT_DB) + DB name"
  com_quit.bin:
    intent: "COM_QUIT(0x01) 패킷 처리 검증"
    format: "MySQL wire protocol: 3B LE length + 1B seq + 0x01(COM_QUIT)"
  empty_payload.bin:
    intent: "빈 페이로드 경계값 처리 검증"
    format: "4바이트 제로 (length=0, seq=0, 페이로드 없음)"
  err_packet.bin:
    intent: "에러 응답 패킷(0xFF) 처리 검증"
    format: "MySQL wire protocol: 0xFF marker + 2B error code + '#' + 5B SQLSTATE + message"
  com_field_list.bin:
    intent: "COM_FIELD_LIST(0x04) 패킷 처리 검증"
    format: "MySQL wire protocol: 3B LE length + 1B seq + 0x04(COM_FIELD_LIST)"
  com_create_db.bin:
    intent: "COM_CREATE_DB(0x05) 패킷 처리 검증"
    format: "MySQL wire protocol: 3B LE length + 1B seq + 0x05(COM_CREATE_DB)"
  com_drop_db.bin:
    intent: "COM_DROP_DB(0x06) 패킷 처리 검증"
    format: "MySQL wire protocol: 3B LE length + 1B seq + 0x06(COM_DROP_DB)"
  com_statistics.bin:
    intent: "COM_STATISTICS(0x09) 패킷 처리 검증"
    format: "MySQL wire protocol: 3B LE length + 1B seq + 0x09(COM_STATISTICS)"
  com_stmt_close.bin:
    intent: "COM_STMT_CLOSE(0x19) prepared statement 종료 패킷 처리 검증"
    format: "MySQL wire protocol: 3B LE length + 1B seq + 0x19(COM_STMT_CLOSE)"
  com_stmt_reset.bin:
    intent: "COM_STMT_RESET(0x1A) prepared statement 리셋 패킷 처리 검증"
    format: "MySQL wire protocol: 3B LE length + 1B seq + 0x1A(COM_STMT_RESET)"
  ok_packet.bin:
    intent: "OK 응답 패킷(0x00) 처리 검증"
    format: "MySQL wire protocol: 3B LE length + 1B seq + 0x00(OK)"
  eof_packet.bin:
    intent: "EOF 패킷(0xFE) 처리 검증"
    format: "MySQL wire protocol: 3B LE length + 1B seq + 0xFE(EOF)"
  truncated_1byte.bin:
    intent: "1바이트 잘린 패킷에 대한 경계값 처리 검증"
    format: "단일 바이트(0xB1), 유효한 패킷 헤더 미완성"
  max_length_header.bin:
    intent: "최대 길이 필드(0xFFFFFF) 패킷 헤더 처리 검증"
    format: "MySQL wire protocol: length=0xFFFFFF(16MB-1) + seq=0xF8, 페이로드 없음"
  malformed_header.bin:
    intent: "손상된 패킷 헤더에 대한 방어적 처리 검증"
    format: "비정상 length 필드(0xCACACA) + COM_INIT_DB 데이터 혼재"
  err_malformed_sqlstate.bin:
    intent: "비정상 SQLSTATE 포함 ERR 패킷 처리 검증"
    format: "MySQL wire protocol: 0xFF + error_code(1045) + 비정상 SQLSTATE 구조"
