name: Weekly Fuzz

on:
  schedule:
    # Every Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:

env:
  VCPKG_ROOT: /opt/vcpkg
  VCPKG_BINCACHE: /tmp/vcpkg-bincache

jobs:
  fuzz-deep:
    name: Deep Fuzz (10min/target)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build gnupg curl
          # LLVM 19 apt repository (clang++-19 for libFuzzer)
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/llvm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/llvm.gpg] https://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" \
            | sudo tee /etc/apt/sources.list.d/llvm19.list
          sudo apt-get update -qq
          sudo apt-get install -y clang-19 llvm-19
          if ! command -v clang++-19 >/dev/null 2>&1; then
            echo "clang++-19 설치 확인 실패"
            exit 1
          fi

      - name: Cache vcpkg binary packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.VCPKG_BINCACHE }}
          key: vcpkg-linux-x64-fuzz-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-linux-x64-fuzz-
            vcpkg-linux-x64-

      - name: Install vcpkg
        run: |
          git clone --depth=1 --branch 2026.01.16 https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
          actual_sha=$(git -C $VCPKG_ROOT rev-parse HEAD)
          expected_sha="66c0373dc7fca549e5803087b9487edfe3aca0a1"
          if [ "$actual_sha" != "$expected_sha" ]; then
            echo "vcpkg SHA mismatch: expected $expected_sha, got $actual_sha"
            exit 1
          fi
          $VCPKG_ROOT/bootstrap-vcpkg.sh -disableMetrics
          mkdir -p $VCPKG_BINCACHE
          echo "VCPKG_BINARY_SOURCES=clear;files,$VCPKG_BINCACHE,readwrite" >> "$GITHUB_ENV"

      - name: Configure (fuzz)
        run: cmake --preset fuzz

      - name: Build fuzz targets
        run: cmake --build build/fuzz -j$(nproc)

      - name: Run fuzz_mysql_packet (10min)
        run: |
          mkdir -p fuzz-artifacts/mysql_packet
          ./build/fuzz/fuzz_mysql_packet \
            tests/fuzz/corpus/mysql_packet/ \
            -max_total_time=600 \
            -artifact_prefix=fuzz-artifacts/mysql_packet/
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1:symbolize=1

      - name: Run fuzz_sql_parser (10min)
        run: |
          mkdir -p fuzz-artifacts/sql_parser
          ./build/fuzz/fuzz_sql_parser \
            tests/fuzz/corpus/sql_parser/ \
            -max_total_time=600 \
            -artifact_prefix=fuzz-artifacts/sql_parser/
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1:symbolize=1

      - name: Run fuzz_policy_engine (10min)
        run: |
          mkdir -p fuzz-artifacts/policy_engine
          ./build/fuzz/fuzz_policy_engine \
            tests/fuzz/corpus/policy_engine/ \
            -max_total_time=600 \
            -artifact_prefix=fuzz-artifacts/policy_engine/
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1:symbolize=1

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-crash-artifacts
          path: fuzz-artifacts/
          retention-days: 30
