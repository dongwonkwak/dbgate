# =============================================================================
# HAProxy — dbgate TCP load balancer
# =============================================================================
# MySQL protocol = Layer 4 (TCP mode)
# Health check via HTTP GET /health on port 8080
# =============================================================================

global
    log stdout format raw local0 info
    maxconn 4096

defaults
    log     global
    mode    tcp
    option  tcplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    retries 3

# ---------------------------------------------------------------------------
# Frontend: MySQL client connections
# ---------------------------------------------------------------------------
frontend mysql_in
    bind *:13306
    default_backend dbgate_backends

# ---------------------------------------------------------------------------
# Backend: dbgate instances (round-robin)
# ---------------------------------------------------------------------------
backend dbgate_backends
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200

    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions

    server dbgate-1 dbgate-1:13306 check port 8080
    server dbgate-2 dbgate-2:13306 check port 8080
    server dbgate-3 dbgate-3:13306 check port 8080

# ---------------------------------------------------------------------------
# Stats page
# ---------------------------------------------------------------------------
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
