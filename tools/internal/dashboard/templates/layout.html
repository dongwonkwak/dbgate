<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dbgate Dashboard</title>
    <link rel="stylesheet" href="/static/pico.min.css">
    <script src="/static/htmx.min.js"></script>
    <style>
        :root {
            --pico-font-size: 16px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            text-align: center;
            padding: 1rem;
        }
        .stat-card h3 {
            margin-bottom: 0.25rem;
            font-size: 0.85rem;
            color: var(--pico-muted-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
        }
        .chart-container {
            position: relative;
            width: 100%;
            height: 200px;
            margin-bottom: 1.5rem;
        }
        .chart-container canvas {
            width: 100% !important;
            height: 100% !important;
        }
        .coming-soon {
            text-align: center;
            padding: 2rem;
            color: var(--pico-muted-color);
        }
        .error-msg {
            color: var(--pico-del-color);
            text-align: center;
            padding: 1rem;
        }
        header nav {
            margin-bottom: 1rem;
        }
        .htmx-indicator {
            opacity: 0;
            transition: opacity 200ms ease-in;
        }
        .htmx-request .htmx-indicator {
            opacity: 1;
        }
    </style>
</head>
<body>
    <main class="container">
        <header>
            <nav>
                <ul>
                    <li><strong>dbgate Dashboard</strong></li>
                    <li><a href="/">Overview</a></li>
                    <li><a href="/policy-tester">Policy Tester</a></li>
                </ul>
                <ul>
                    <li><small class="htmx-indicator" id="loading">updating...</small></li>
                </ul>
            </nav>
        </header>
        {{template "content" .}}
    </main>
    <script src="/static/dashboard.js"></script>
</body>
</html>
